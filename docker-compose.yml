services:
    plexterbox:
        build: .
        image: plexterbox
        container_name: plexterbox
        restart: unless-stopped
        ports:
            - '12349:12349'
        volumes:
            # Persists session.json and plexterbox.db across container restarts/updates.
            - plexterbox-data:/root/.config/plexterbox
        environment:
            # Override the default port inside the container if needed.
            # PORT: 12349

volumes:
    plexterbox-data:
